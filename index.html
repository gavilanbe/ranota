<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RaNota — Frog Voxel Game</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#0a1a0a}
    #renderCanvas{width:100%;height:100%;display:block;touch-action:none;outline:none}
    #loading{position:absolute;inset:0;display:flex;justify-content:center;align-items:center;
      background:#0a1a0a;color:#6f6;font-family:'Courier New',monospace;font-size:1.6em;
      z-index:100;transition:opacity .6s}
    #loading.hidden{opacity:0;pointer-events:none}
    #click-prompt{position:absolute;inset:0;display:flex;justify-content:center;align-items:center;
      color:#afa;font-family:'Courier New',monospace;font-size:1.2em;z-index:50;
      background:rgba(0,0,0,0.4);cursor:pointer;transition:opacity .4s}
    #click-prompt.hidden{opacity:0;pointer-events:none}
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>
  <div id="loading">Loading RaNota...</div>
  <div id="click-prompt" class="hidden">Click to Play</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
